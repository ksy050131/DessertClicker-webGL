<!DOCTYPE html>
<html lang="en-us">

<head>
  <!-- Unity Keyboard Input Isolation Proxy -->
  <script>
    (function () {
      const originalAddEventListener = EventTarget.prototype.addEventListener;
      EventTarget.prototype.addEventListener = function (type, listener, options) {
        if (type === 'keydown' || type === 'keyup' || type === 'keypress') {
          const wrapper = function (e) {
            // Ignore events globally if user is typing in an HTML input
            if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT')) {
              // But DO run the listener if it's attached directly to that input element (e.g., our script.js Enter key listeners)
              if (this !== e.target) {
                return; // Block Unity's global listeners from seeing this event
              }
            }
            if (typeof listener === 'function') {
              return listener.apply(this, arguments);
            } else if (listener && typeof listener.handleEvent === 'function') {
              return listener.handleEvent(e);
            }
          };
          return originalAddEventListener.call(this, type, wrapper, options);
        }
        return originalAddEventListener.call(this, type, listener, options);
      };
    })();
  </script>

  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity Web Player | DessertClicker2</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">

  <!-- Custom UI Styles -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
    <div id="unity-warning"> </div>
    <div id="unity-footer">
      <div id="unity-logo-title-footer"></div>
      <div id="unity-fullscreen-button"></div>
      <div id="unity-build-title">DessertClicker2</div>
    </div>
  </div>

  <!-- Layer 1: Floating UI Wrapper (pointer-events: none) -->
  <div id="ui-wrapper"
    style="pointer-events: none; position: absolute; top:0; left:0; width:100%; height:100%; z-index:10;">
    <!-- Left Navigation (Target Widgets) -->
    <div id="LeftNav">
      <button class="nav-btn btn-todo" data-widget-target="Todolist" title="Todo List"></button>
      <button class="nav-btn btn-music" data-widget-target="MusicPlayer" title="Music Player"></button>
      <button class="nav-btn btn-fomodoro" data-widget-target="Fomodoro" title="Fomodoro"></button>
    </div>

    <!-- 1. Todolist Widget -->
    <div class="widget" id="Todolist">
      <div class="widget-header">
        <span class="title">Todo</span>
        <div>
          <span class="add-todo-btn" title="Add Todo">[+]</span>
          <span class="close-btn">&times;</span>
        </div>
      </div>
      <div class="widget-content">
        <div id="todo-list-container">
          <div class="todo-item">
            <input type="checkbox" id="todo1">
            <span class="todo-label">Todo 1</span>
            <span class="trash-btn">🗑</span>
          </div>
        </div>
        <!-- Hidden by default -->
        <div class="add-todo-form" style="display: none;">
          <input type="text" id="new-todo-input" placeholder="New task... (Enter to save)">
        </div>
      </div>
    </div>

    <!-- 2. Fomodoro Widget -->
    <div class="widget" id="Fomodoro">
      <div class="widget-header">
        <span class="title">Fomodoro</span>
        <span class="close-btn">&times;</span>
      </div>
      <div class="widget-content fomodoro-content">
        <div class="time-display-container">
          <div class="time-display" title="Click to edit time">25:00</div>
          <select class="time-select" style="display: none;">
            <option value="5">05:00</option>
            <option value="10">10:00</option>
            <option value="15">15:00</option>
            <option value="20">20:00</option>
            <option value="25" selected>25:00</option>
            <option value="30">30:00</option>
            <option value="35">35:00</option>
            <option value="40">40:00</option>
            <option value="45">45:00</option>
            <option value="50">50:00</option>
          </select>
        </div>
        <div class="controls">
          <button class="StartButton">Start</button>
          <button class="StopButton">Stop</button>
        </div>
      </div>
    </div>

    <!-- 3. MusicPlayer Widget -->
    <div class="widget" id="MusicPlayer">
      <div class="widget-header">
        <span class="title">Music Player</span>
        <span class="close-btn">&times;</span>
      </div>
      <div class="widget-content player-content">
        <div class="url-input-row">
          <input type="text" id="music-url-input" placeholder="YouTube or Spotify URL">
          <button id="music-url-submit">Load</button>
        </div>
        <div id="MusicEmbedContainer">
          <div class="music-placeholder">No Media Loaded</div>
        </div>
      </div>
    </div>
  </div>
  <script>
    var canvas = document.querySelector("#unity-canvas");

    // Shows a temporary message banner/ribbon for a few seconds, or
    // a permanent error message on top of the canvas if type=='error'.
    // If type=='warning', a yellow highlight color is used.
    // Modify or remove this function to customize the visually presented
    // way that non-critical warnings and error messages are presented to the
    // user.
    function unityShowBanner(msg, type) {
      var warningBanner = document.querySelector("#unity-warning");
      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
      }
      var div = document.createElement('div');
      div.innerHTML = msg;
      warningBanner.appendChild(div);
      if (type == 'error') div.style = 'background: red; padding: 10px;';
      else {
        if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
        setTimeout(function () {
          warningBanner.removeChild(div);
          updateBannerVisibility();
        }, 5000);
      }
      updateBannerVisibility();
    }

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
    var config = {
      arguments: [],
      dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
      frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
      codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "{{{ COMPANY_NAME }}}",
      productName: "{{{ PRODUCT_NAME }}}",
      productVersion: "{{{ PRODUCT_VERSION }}}",
      showBanner: unityShowBanner,
      // errorHandler: function(err, url, line) {
      //    alert("error " + err + " occurred at line " + line);
      //    // Return 'true' if you handled this error and don't want Unity
      //    // to process it further, 'false' otherwise.
      //    return true;
      // },
    };

    // By default, Unity keeps WebGL canvas render target size matched with
    // the DOM size of the canvas element (scaled by window.devicePixelRatio)
    // Set this to false if you want to decouple this synchronization from
    // happening inside the engine, and you would instead like to size up
    // the canvas DOM size and WebGL render target sizes yourself.
    // config.matchWebGLToCanvasSize = false;

    // If you would like all file writes inside Unity Application.persistentDataPath
    // directory to automatically persist so that the contents are remembered when
    // the user revisits the site the next time, uncomment the following line:
    // config.autoSyncPersistentDataPath = true;
    // This autosyncing is currently not the default behavior to avoid regressing
    // existing user projects that might rely on the earlier manual
    // JS_FileSystem_Sync() behavior, but in future Unity version, this will be
    // expected to change.

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      // Mobile device style: fill the whole browser client area with the game canvas:

      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
      document.getElementsByTagName('head')[0].appendChild(meta);
      document.querySelector("#unity-container").className = "unity-mobile";
      canvas.className = "unity-mobile";

      // To lower canvas resolution on mobile devices to gain some
      // performance, uncomment the following line:
      // config.devicePixelRatio = 1;


    } else {
      // Desktop style: Render the game canvas in a window that can be maximized to fullscreen:
      canvas.style.width = "960px";
      canvas.style.height = "600px";
    }

    document.querySelector("#unity-loading-bar").style.display = "block";

    var script = document.createElement("script");
    script.src = loaderUrl;

    // EXPOSE TO GLOBALS SO SCRIPT.JS CAN ACCESS
    var unityInstance = null;

    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
      }).then((instance) => {
        unityInstance = instance; // Store globally
        document.querySelector("#unity-loading-bar").style.display = "none";
        document.querySelector("#unity-fullscreen-button").onclick = () => {
          unityInstance.SetFullscreen(1);
        };

        // Unloading web content from DOM so that browser GC can run can be tricky to get right.
        // This code snippet shows how to correctly implement a Unity content Unload mechanism to a web page.

        // Unloading Unity content enables a web page to reclaim the memory used by Unity, e.g. for
        // the purpose of later loading another Unity content instance on the _same_ web page.

        // When using this functionality, take caution to carefully make sure to clear all JavaScript code,
        // DOM element and event handler references to the old content you may have retained, or
        // otherwise the browser's garbage collector will be unable to reclaim the old page.

        // N.b. Unity content does _not_ need to be manually unloaded when the user is navigating away from
        // the current page to another web page. The browser will take care to clear memory of old visited
        // pages automatically. This functionality is only needed if you want to switch between loading
        // multiple Unity builds on a single web page.
        var quit = document.createElement("button");
        quit.style = "margin-left: 5px; background-color: lightgray; border: none; padding: 5px; cursor: pointer";
        quit.innerHTML = "Unload";
        document.querySelector("#unity-build-title").appendChild(quit);
        quit.onclick = () => {
          // Quit Unity application execution
          unityInstance.Quit().then(() => {
            // Remove DOM elements from the page so GC can run
            document.querySelector("#unity-container").remove();
            canvas = null;
            // Remover script elements from the page so GC can run
            script.remove();
            script = null;
          });
        };
      }).catch((message) => {
        alert(message);
      });
    };

    document.body.appendChild(script);

  </script>

  <!-- Custom UI Scripts -->
  <script src="script.js"></script>
</body>

</html>
